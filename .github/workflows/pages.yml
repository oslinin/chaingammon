name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            contracts/pnpm-lock.yaml

      - name: Install contract dependencies
        run: pnpm install --frozen-lockfile
        working-directory: contracts

      - name: Compile contracts
        run: pnpm exec hardhat compile
        working-directory: contracts

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build static export
        run: pnpm build
        working-directory: frontend
        env:
          BASE_PATH: /chaingammon
          # WalletConnect Project ID (free, register at https://cloud.reown.com).
          # When set, the frontend exposes a "WalletConnect" button alongside
          # "Browser wallet" so mobile users can connect from regular Chrome/
          # Safari without dropping into MetaMask Mobile's in-app browser
          # (which has a habit of navigating away from the dapp after the
          # connect approval). Empty value -> WalletConnect connector is
          # skipped at build time and the UI degrades gracefully.
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

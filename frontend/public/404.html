<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Chaingammon</title>
  <script>
    // GitHub Pages SPA redirect.
    // When GitHub Pages can't find a static file it serves this page.
    // We re-encode the intended URL as a query string and redirect to
    // the app root so the SPA can restore the path client-side.
    // pathSegmentsToKeep=1 preserves the /chaingammon basePath segment.
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
